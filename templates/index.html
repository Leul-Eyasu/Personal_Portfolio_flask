{% extends "base.html" %}

{% block content %}
<div class="container">
    <section class="px-5 py-5 text-left">
        <h1>Hi, I am {{student.name}}</h1>
        <p>{{student.role}}</p>
        <p>{{student.bio}}</p>
        <h2>Skills</h2>
        {% for skill in student.skill %}
            <span class="btn btn-outline-secondary btn-sm">{{skill}}</span>
        {% endfor %}
    </section>
</div>

{% endblock %}
