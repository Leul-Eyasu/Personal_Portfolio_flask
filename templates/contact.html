{% extends "base.html" %}

{% block content %}
<section class="page-header">
    <h1>Contact</h1>
    <p>Fell free to reach out to me.</p>
</section>
<section class="contact-section">
    <p><a href="mailto:{{student.email}}">{{student.email}}</a></p>
    <p><a href="{{student.github}}" target="_blank">{{student.github}}</a></p>
</section>
<form action="/contact/submit" method="post" >
    <div class="form-group">
        <label for="name" >Your name</label>
        <input type="text" name="name" id="name" placeholder="Enter Your name" required>
    </div>
    <div class="form-group">
        <label for="message" >Your Message</label>
        <textarea type="text" name="message" id="message" placeholder="Enter Your message" rows="5"></textarea>
    </div>
    <button type="submit">Submit message</button>
</form>
{% endblock %}
